name: Generate and Deploy HTML from README

on:
  push:
    paths:
      - 'README.md'
      - 'docs/**'
      - '.github/workflows/deploy.yml'
    branches:
      - main
  workflow_dispatch:

jobs:
  generate_and_deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout main branch code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install beautifulsoup4 markdown

    - name: Generate HTML
      run: python generate_pages.py

    - name: Copy images to output
      run: |
        mkdir -p gh-pages-staging
        cp index.html gh-pages-staging/
        if [ -d docs/images ]; then
          mkdir -p gh-pages-staging/docs/images
          cp docs/images/*.png gh-pages-staging/docs/images/
        fi

    - name: Checkout gh-pages branch
      uses: actions/checkout@v4
      with:
        ref: gh-pages
        path: gh-pages-checkout # Checkout gh-pages into a different directory

    - name: Copy built files to gh-pages
      run: |
        cp gh-pages-staging/index.html gh-pages-checkout/
        if [ -d gh-pages-staging/docs/images ]; then
          mkdir -p gh-pages-checkout/docs/images
          cp gh-pages-staging/docs/images/*.png gh-pages-checkout/docs/images/
        fi

    - name: Configure Git
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"

    - name: Commit and push changes to gh-pages
      run: |
        cd gh-pages-checkout/
        git add index.html
        git add docs/ || true
        git commit -m "Update site from README.md" || echo "No changes to commit"
        git push origin gh-pages
